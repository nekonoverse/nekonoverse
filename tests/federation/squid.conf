# Squid forward proxy for federation proxy-leak testing.
# All outbound HTTP(S) from app/worker containers should pass through here.

http_port 3128

# Allow all traffic (test environment only)
acl all src all
http_access allow all

# Logging — access.log is checked by tests to verify proxy usage.
access_log /var/log/squid/access.log squid
cache_log /var/log/squid/cache.log

# Minimal cache (we only care about logging)
cache deny all

# Disable DNS-based ACLs for speed
dns_nameservers 127.0.0.11

# Shutdown quickly
shutdown_lifetime 1 seconds
