services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: nekonoverse
      POSTGRES_USER: nekonoverse
      POSTGRES_PASSWORD: testpass
    healthcheck:
      test: pg_isready -U nekonoverse
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - mastodon-client-test

  valkey:
    image: valkey/valkey:8-alpine
    healthcheck:
      test: valkey-cli ping
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - mastodon-client-test

  nekono3s:
    image: ghcr.io/nananek/nekono3s:latest
    environment:
      S3_ACCESS_KEY_ID: nekonoverse
      S3_SECRET_ACCESS_KEY: changeme-s3
      S3_STORAGE_PATH: /data
      S3_REGION: us-east-1
      S3_XATTR_JCLOUDS_COMPAT: "true"
    healthcheck:
      test: python -c "import socket; s=socket.create_connection(('localhost',8080),2); s.close()"
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - mastodon-client-test

  s3proxy-deliverer:
    image: ghcr.io/nananek/s3proxy-deliverer:latest
    environment:
      STORAGE_ROOT: /data
    volumes_from:
      - nekono3s:ro
    volumes:
      - s3proxy_sock:/var/run/s3proxy-deliverer
    depends_on:
      nekono3s:
        condition: service_healthy
    networks:
      - mastodon-client-test

  app:
    build: ./backend
    command: >
      sh -c "alembic upgrade head &&
             python -m app.cli create-admin --username admin --email admin@test.local --password testpassword123 || true &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level info"
    environment:
      DATABASE_URL: postgresql+asyncpg://nekonoverse:testpass@postgres:5432/nekonoverse
      VALKEY_URL: valkey://valkey:6379/0
      DOMAIN: localhost
      SECRET_KEY: e2e-test-secret-key
      FRONTEND_URL: http://localhost:3080
      DEBUG: "true"
      REGISTRATION_OPEN: "true"
      S3_ENDPOINT_URL: http://nekono3s:8080
      S3_ACCESS_KEY_ID: nekonoverse
      S3_SECRET_ACCESS_KEY: changeme-s3
      S3_BUCKET: nekonoverse
      S3_REGION: us-east-1
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      nekono3s:
        condition: service_healthy
    healthcheck:
      test: python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"
      interval: 3s
      timeout: 5s
      retries: 15
    networks:
      - mastodon-client-test

  worker:
    build: ./backend
    command: python -m app.worker.main
    environment:
      DATABASE_URL: postgresql+asyncpg://nekonoverse:testpass@postgres:5432/nekonoverse
      VALKEY_URL: valkey://valkey:6379/0
      DOMAIN: localhost
      SECRET_KEY: e2e-test-secret-key
      DEBUG: "true"
      S3_ENDPOINT_URL: http://nekono3s:8080
      S3_ACCESS_KEY_ID: nekonoverse
      S3_SECRET_ACCESS_KEY: changeme-s3
      S3_BUCKET: nekonoverse
      S3_REGION: us-east-1
    depends_on:
      app:
        condition: service_healthy
    networks:
      - mastodon-client-test

  nginx:
    image: nginx:alpine
    volumes:
      - ./tests/mastodon-client/nginx.conf:/etc/nginx/nginx.conf:ro
      - s3proxy_sock:/var/run/s3proxy-deliverer
    depends_on:
      app:
        condition: service_healthy
      s3proxy-deliverer:
        condition: service_started
    networks:
      - mastodon-client-test

  test-runner:
    profiles: ["test"]
    build: ./tests/mastodon-client
    environment:
      TEST_SERVER_URL: http://nginx:80
    depends_on:
      app:
        condition: service_healthy
      nginx:
        condition: service_started
    networks:
      - mastodon-client-test

volumes:
  s3proxy_sock:

networks:
  mastodon-client-test:
    driver: bridge
