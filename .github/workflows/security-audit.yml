name: Security Audit

on:
  push:
    branches: [ "develop" ]
    paths:
      - 'backend/requirements*.txt'
      - 'backend/pyproject.toml'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
  pull_request:
    branches: [ "develop" ]
    paths:
      - 'backend/requirements*.txt'
      - 'backend/pyproject.toml'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
  schedule:
    - cron: '0 16 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    name: pip audit (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # pip 自身の CVE-2026-6357 等を吸収するため最新へ upgrade
      # (CVE-2026-3219 は pip 側に修正版が無く下記 `--ignore-vuln` を継続している)
      - run: pip install --upgrade pip
      - run: pip install pip-audit
      - run: pip install -e backend/
      - run: |
          pip-audit \
            --ignore-vuln CVE-2026-4539 \
            --ignore-vuln CVE-2026-3219
          # CVE-2026-4539: pygments 2.19.2, no fix available yet
          # CVE-2026-3219: pip 26.0.1 自身、修正版未リリース。tar+ZIP 連結ファイル誤認識 (CVSS 4.6
          #   MEDIUM、AV:L + UI:A)。CI は信頼できる PyPI/自前依存のみ install するので実質リスクなし

  npm-audit:
    name: npm audit (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm audit --omit=dev
