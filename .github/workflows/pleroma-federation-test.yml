name: Pleroma Federation Test

on:
  workflow_dispatch:

jobs:
  pleroma-federation-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Build and start services
        run: docker compose -f docker-compose.pleroma-federation.yml up -d --build --wait
        timeout-minutes: 12

      - name: Wait for Pleroma to be ready
        run: |
          for i in $(seq 1 60); do
            if docker compose -f docker-compose.pleroma-federation.yml exec -T pleroma-app wget -q -O- http://localhost:4000/api/v1/instance 2>/dev/null | grep -q "uri"; then
              echo "Pleroma is ready"
              break
            fi
            echo "Waiting for Pleroma... ($i/60)"
            sleep 3
          done

      - name: Run federation tests
        run: docker compose -f docker-compose.pleroma-federation.yml run --rm --no-deps test-runner

      - name: Collect logs
        if: always()
        run: |
          docker compose -f docker-compose.pleroma-federation.yml logs app-neko worker-neko pleroma-app > pleroma-federation-logs.txt 2>&1

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pleroma-federation-logs
          path: pleroma-federation-logs.txt

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.pleroma-federation.yml down -v
