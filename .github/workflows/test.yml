name: Test

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: nekonoverse
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: nekonoverse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      valkey:
        image: valkey/valkey:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://nekonoverse:testpass@localhost:5432/nekonoverse_test
          VALKEY_URL: valkey://localhost:6379/1
          DOMAIN: localhost
          SECRET_KEY: test-secret-key
          DEBUG: "true"
          REGISTRATION_OPEN: "true"
        run: python -m pytest tests/ -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build
        working-directory: frontend
        run: npm run build

  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose -f docker-compose.e2e.yml up -d --build --wait

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        working-directory: tests/e2e
        run: npm ci && npx playwright install --with-deps firefox chromium

      - name: Run E2E tests
        working-directory: tests/e2e
        run: npx playwright test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: tests/e2e/test-results/

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
