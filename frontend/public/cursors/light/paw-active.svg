  <ellipse cx="7.5" cy="14" rx="2.4" ry="1.8" fill="#B86B8A" transform="rotate(-20 7.5 14)"/>
  <ellipse cx="16" cy="11" rx="3.8" ry="2.8" fill="#d63851"/>
